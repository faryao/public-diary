<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace }}">
    <title>{% if page.layout == 'post' %}{{ page.date | date: '%B %-d, %Y' }} — {% elsif page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} home">
        <span>Y</span>{{ site.title }}
      </a>
      <nav aria-label="Main navigation">
        <a href="{{ '/' | relative_url }}">Timeline</a>
        <a href="https://github.com/{{ site.github_username }}/{{ site.repository_name }}" target="_blank" rel="noreferrer">GitHub ↗</a>
      </nav>
    </header>

    <main>{{ content }}</main>

    <footer>
      <p>Written openly. Kept thoughtfully.</p>
      <p>© <span id="year"></span> {{ site.author }}</p>
    </footer>
    <script src="{{ '/assets/app.js' | relative_url }}"></script>
    <script data-goatcounter="https://faryao.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  </body>
</html>
